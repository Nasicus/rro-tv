name: release

# Fires when you push a tag matching v* (e.g. v0.1.0, v1.2.3).
# Builds a signed AAB + APK, attaches them to a GitHub Release. The AAB is
# what you upload to Play Console; the APK is handy for sideloading to a
# test TV without going through Play's internal track.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/upload.jks"
          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/signing/upload.jks" >> "$GITHUB_ENV"

      - name: Build release bundle + APK
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$AAB" "$APK"

      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.aab }}
            ${{ steps.artifacts.outputs.apk }}
          generate_release_notes: true
          draft: false
          prerelease: false
